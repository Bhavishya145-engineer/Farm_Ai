<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmAI | User Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            500: '#10b981',
                            600: '#059669',
                        },
                        deep: '#020617',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020617;
            background-image: radial-gradient(circle at 100% 0%, rgba(16, 185, 129, 0.03) 0%, transparent 40%);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-field {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #10b981;
            background: rgba(30, 41, 59, 0.6);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .avatar-glow {
            box-shadow: 0 0 40px -10px rgba(16, 185, 129, 0.3);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.8s ease-out forwards;
        }
    </style>
</head>

<body class="text-slate-200 min-h-screen font-sans flex items-center justify-center p-6">

    <div class="w-full max-w-4xl animate-fadeIn">

        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <a href="/"
                    class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center border border-white/5 hover:bg-slate-700 transition-all">
                    <i class="fas fa-arrow-left text-sm text-slate-400"></i>
                </a>
                <h2 class="font-display text-2xl font-bold text-white">Account <span
                        class="text-slate-500">Settings</span></h2>
            </div>
            <button onclick="window.logout()"
                class="text-xs font-bold text-red-500/80 hover:text-red-400 uppercase tracking-widest transition-colors">Logout
                Session</button>
        </div>

        <div class="grid md:grid-cols-12 gap-8">

            <!-- Profile Side -->
            <div class="md:col-span-4 flex flex-col items-center">
                <div class="glass-card w-full rounded-[2rem] p-8 text-center">
                    <div class="relative w-32 h-32 mx-auto mb-6 group cursor-pointer">
                        <img id="profileImage" src=""
                            class="w-full h-full rounded-[2rem] object-contain avatar-glow border-2 border-brand-500/20">
                        <label for="imageUpload"
                            class="absolute inset-0 flex items-center justify-center bg-black/60 rounded-[2rem] opacity-0 group-hover:opacity-100 transition-all">
                            <i class="fas fa-camera text-white text-xl"></i>
                            <input type="file" id="imageUpload" accept="image/*" class="hidden"
                                onchange="window.uploadImage(this)">
                        </label>
                    </div>
                    <h3 id="displayUsername" class="font-display text-xl font-bold text-white mb-1">--</h3>
                    <p class="text-[10px] uppercase font-bold text-brand-500 tracking-widest mb-6">Verified Farmer</p>

                    <div class="space-y-2 text-left pt-6 border-t border-white/5">
                        <a href="/change-password-page"
                            class="block w-full py-3 px-4 rounded-xl bg-white/5 text-xs font-bold text-slate-300 hover:bg-white/10 transition-all border border-white/5 text-center">
                            <i class="fas fa-key mr-2 opacity-50"></i> Security Settings
                        </a>
                    </div>
                </div>
            </div>

            <!-- Detail Side -->
            <div class="md:col-span-8">
                <div class="glass-card rounded-[2.5rem] p-10 h-full">
                    <h4 class="font-display text-xl font-bold text-white mb-8">Personal Information</h4>
                    <form id="profileForm" class="space-y-6">
                        <div class="grid grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label
                                    class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1">Account
                                    Username</label>
                                <input type="text" id="username" disabled
                                    class="input-field w-full px-5 py-4 rounded-2xl text-slate-400 outline-none cursor-not-allowed">
                            </div>
                            <div class="space-y-2">
                                <label
                                    class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1">Member
                                    Since</label>
                                <input type="text" value="Feb 2026" disabled
                                    class="input-field w-full px-5 py-4 rounded-2xl text-slate-600 outline-none cursor-not-allowed">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label
                                class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1 flex justify-between items-center">
                                <span>Farm Location Address</span>
                                <button type="button" onclick="window.detectLocation()"
                                    class="text-[10px] text-brand-500 hover:text-brand-400 font-bold uppercase tracking-widest flex items-center gap-1 transition-all">
                                    <i class="fas fa-location-crosshairs"></i>
                                    Detect
                                </button>
                            </label>
                            <textarea id="address" rows="4"
                                class="input-field w-full px-5 py-4 rounded-2xl text-white outline-none"
                                placeholder="Your production facility address..."></textarea>
                        </div>

                        <div class="pt-6">
                            <button type="submit"
                                class="w-full bg-brand-500 hover:bg-brand-600 py-4 rounded-2xl text-white font-bold tracking-wide text-lg shadow-xl shadow-brand-500/20 transition-all">
                                Update Profile Data
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) { window.location.href = '/login-page'; return; }

            document.getElementById('username').value = user.username;
            document.getElementById('displayUsername').textContent = user.username;
            document.getElementById('address').value = user.address || '';

            const imgUrl = user.profile_picture ? (user.profile_picture.startsWith('http') ? user.profile_picture : '/static/' + user.profile_picture) : 'https://ui-avatars.com/api/?name=' + user.username + '&background=10b981&color=fff&size=512';
            document.getElementById('profileImage').src = imgUrl;
        });

        window.uploadImage = async (input) => {
            if (!input.files[0]) return;
            const formData = new FormData();
            formData.append('file', input.files[0]);

            const user = JSON.parse(localStorage.getItem('user'));
            try {
                const res = await fetch(`/users/${user.username}/profile-picture`, {
                    method: 'POST', body: formData
                });
                if (res.ok) {
                    const result = await res.json();
                    user.profile_picture = result.profile_picture;
                    localStorage.setItem('user', JSON.stringify(user));
                    location.reload();
                }
            } catch (e) { console.error(e); }
        };

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = JSON.parse(localStorage.getItem('user'));
            const address = document.getElementById('address').value;
            try {
                const res = await fetch(`/users/${user.username}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address })
                });
                if (res.ok) {
                    const result = await res.json();
                    user.address = result.address;
                    localStorage.setItem('user', JSON.stringify(user));
                    alert('Success! Profile updated.');
                }
            } catch (e) { console.error(e); }
        });

        window.detectLocation = () => {
            if (!navigator.geolocation) {
                showError("Geolocation is not supported");
                return;
            }

            const btn = document.querySelector('button[onclick="window.detectLocation()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Detecting...';
            btn.disabled = true;

            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                    const data = await res.json();
                    if (data.display_name) {
                        document.getElementById('address').value = data.display_name;
                    }
                } catch (err) {
                    showError("Location service error");
                } finally {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }, (err) => {
                showError("Location access denied");
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        };

        function showError(msg) {
            const div = document.createElement('div');
            div.className = 'fixed top-6 right-6 bg-red-500/10 border border-red-500/20 text-red-500 px-6 py-4 rounded-xl backdrop-blur-md shadow-2xl animate-fadeIn z-50';
            div.innerHTML = `<i class="fas fa-exclamation-circle mr-2"></i> ${msg}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }

        window.logout = () => {
            localStorage.removeItem('user');
            window.location.href = '/login-page';
        };
    </script>
</body>

</html>

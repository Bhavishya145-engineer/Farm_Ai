<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmAI | Analysis Results</title>
    <link rel="icon" type="image/png" href="logo/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#ecfdf5',
                            500: '#10b981',
                            600: '#059669',
                        },
                        deep: '#020617',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            transition: background-color 0.3s, color 0.3s;
            background-image:
                radial-gradient(circle at 100% 0%, rgba(16, 185, 129, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 0% 100%, rgba(59, 130, 246, 0.03) 0%, transparent 40%);
        }

        .dark body {
            background-color: #020617;
            color: #ffffff;
            background-image: url('logo/results_bg_dark.png');
            background-size: cover;
            background-attachment: fixed;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 1);
            transition: all 0.3s ease;
        }

        .dark .glass-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gradient-text-green {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .crop-hero-card {
            background: white;
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .dark .crop-hero-card {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), url('logo/results_dark_aesthetic.png');
            background-size: cover;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.8s ease-out forwards;
        }

        .animate-slideUp {
            animation: slideUp 0.6s ease-out forwards;
        }
    </style>
</head>

<body class="text-slate-200 min-h-screen font-sans pb-20">

    <header
        class="w-full h-20 flex items-center justify-between px-8 border-b border-slate-200 dark:border-white/5 bg-white/80 dark:bg-deep/50 backdrop-blur-md sticky top-0 z-50 transition-colors duration-300">
        <div class="flex items-center gap-3">
            <div
                class="w-10 h-10 rounded-xl bg-brand-500/10 border border-brand-500/20 flex items-center justify-center p-1.5 shadow-lg shadow-brand-500/10">
                <img src="logo/logo.png" alt="FarmAI Icon" class="w-full h-full object-contain">
            </div>
            <h1
                class="font-display text-xl font-bold text-slate-900 dark:text-white uppercase tracking-wider leading-none">
                Farm<span class="text-brand-500">AI</span></h1>
        </div>
        <div class="flex items-center gap-6">
            <!-- Theme Toggle -->
            <button id="theme-toggle"
                class="p-2.5 rounded-xl bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 text-slate-500 dark:text-slate-400 hover:text-brand-500 transition-all">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block"></i>
            </button>
            <a href="/history-page"
                class="text-[10px] font-black text-slate-500 hover:text-brand-500 uppercase tracking-widest transition-colors">History</a>
            <button onclick="window.print()"
                class="text-[10px] font-black text-slate-500 hover:text-white uppercase tracking-widest transition-colors">Print
                Export</button>
            <a href="/"
                class="btn-primary-small bg-brand-500 px-4 py-2 rounded-lg text-xs font-bold text-white hover:bg-brand-600 transition-all">New
                Analysis</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 mt-12">

        <div class="mb-12 animate-slideUp">
            <h2 class="font-display text-4xl font-black text-slate-900 dark:text-white mb-2 uppercase tracking-tight">
                Recommendation <span class="gradient-text-green">Report</span></h2>
            <p class="text-slate-500 font-medium lowercase tracking-wide">Neural engine assessment of soil & climate
                compatibility.</p>
        </div>

        <!-- Top Result Hero -->
        <div class="grid lg:grid-cols-12 gap-8 mb-12">
            <div class="lg:col-span-8 animate-slideUp" style="animation-delay: 0.1s">
                <div
                    class="crop-hero-card rounded-[2.5rem] p-10 h-full flex flex-col md:flex-row gap-10 overflow-hidden relative group">
                    <div class="relative z-10 flex-grow">
                        <span
                            class="inline-block px-4 py-1 rounded-full bg-brand-500 text-white text-[10px] font-black uppercase tracking-[0.2em] mb-6 shadow-lg shadow-brand-500/20">99.3%
                            Optimal</span>
                        <h3 class="text-slate-400 text-lg font-bold mb-1">Primary Recommendation</h3>
                        <div class="flex items-center gap-4 mb-8">
                            <div
                                class="w-16 h-16 rounded-full border-2 border-brand-500/30 overflow-hidden shadow-lg shadow-brand-500/10">
                                <img id="bestCropIcon" src="" class="w-full h-full object-contain">
                            </div>
                            <h4 id="bestCrop"
                                class="font-display text-6xl md:text-7xl font-black text-white tracking-tighter capitalize leading-none">
                                --</h4>
                        </div>

                        <div class="flex items-end gap-2 mb-8">
                            <span id="confidenceVal"
                                class="font-display text-6xl font-bold text-brand-500 leading-none">--</span>
                            <span class="text-2xl font-bold text-brand-500/50 pb-1">% compatibility</span>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="p-4 rounded-3xl bg-white/5 border border-white/5 backdrop-blur-sm">
                                <p class="text-[10px] uppercase font-black text-slate-500 mb-1 tracking-widest">Growth
                                    Index</p>
                                <p class="text-xs font-bold text-white">Highly Favorable</p>
                            </div>
                            <div class="p-4 rounded-3xl bg-white/5 border border-white/5 backdrop-blur-sm">
                                <p class="text-[10px] uppercase font-black text-slate-500 mb-1 tracking-widest">Resource
                                    Demand</p>
                                <p class="text-xs font-bold text-white">Moderate</p>
                            </div>
                        </div>
                    </div>

                    <div
                        class="relative z-10 w-full md:w-64 h-64 md:h-auto rounded-[2rem] overflow-hidden border border-white/10 group-hover:border-brand-500/30 transition-all duration-500">
                        <img id="bestCropImage" src=""
                            class="w-full h-full object-contain transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-deep/80 via-transparent to-transparent">
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 animate-slideUp" style="animation-delay: 0.2s">
                <div class="glass-card rounded-[2.5rem] p-8 h-full flex flex-col">
                    <h4 class="font-display text-xl font-bold text-white mb-6 uppercase tracking-widest text-[14px]">
                        Probability Matrix</h4>
                    <div id="chart" class="flex-grow w-full min-h-[250px]"></div>
                    <p id="modelAccuracyBadge"
                        class="text-[9px] text-center text-slate-500 uppercase font-bold tracking-widest mt-4">System
                        Accuracy: --%</p>
                </div>
            </div>
        </div>
        </div>
        </div>

        <!-- Inputs Summary -->
        <div class="glass-card rounded-[2.5rem] p-10 mb-12 animate-slideUp" style="animation-delay: 0.3s">
            <div class="flex items-center justify-between mb-8 overflow-x-auto no-scrollbar gap-8" id="inputSummary">
                <!-- Dynamic items -->
            </div>
        </div>

        <!-- Alternatives -->
        <div class="animate-slideUp" style="animation-delay: 0.4s">
            <h4 class="font-display text-2xl font-bold text-white mb-8">Secondary <span
                    class="text-slate-600">Options</span></h4>
            <div id="otherSuggestions" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <!-- Dynamic cards -->
            </div>
        </div>

    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const resultsData = sessionStorage.getItem('cropPredictionResults');
            const inputData = sessionStorage.getItem('cropInputData');

            if (!resultsData) {
                window.location.href = '/';
                return;
            }

            const result = JSON.parse(resultsData);
            const inputs = JSON.parse(inputData || '{}');

            // Theme Management
            const themeToggle = document.getElementById('theme-toggle');
            themeToggle.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            });

            function getCropImage(cropName) {
                const mapping = {
                    'rice': 'rice.jpeg', 'maize': 'maize.jpg', 'chickpea': 'chickpea.png', 'kidneybeans': 'kidneybeans.png',
                    'pigeonpeas': 'pigeonpeas.webp', 'mothbeans': 'mothbeans.jpg', 'mungbean': 'mungbean.jpg', 'blackgram': 'blackgram.jpg',
                    'lentil': 'lentil.png', 'pomegranate': 'pomegranate.jpg', 'banana': 'banana.png', 'mango': 'mango.png',
                    'grapes': 'grapes.jpg', 'watermelon': 'watermelon.png', 'muskmelon': 'muskmelon.jpg', 'apple': 'apple.jpg',
                    'orange': 'orange.jpg', 'papaya': 'papaya.jpg', 'coconut': 'coconut.jpg', 'cotton': 'cotton.png',
                    'jute': 'jute.jpg', 'coffee': 'coffee.jpg'
                };
                const key = cropName.toLowerCase().replace(/\s+/g, '');
                return `logo/crops/${mapping[key] || 'default.jpg'}`;
            }

            if (!result.suggestions || result.suggestions.length === 0) {
                document.getElementById("bestCrop").textContent = "No Match";
                document.getElementById("confidenceVal").textContent = "0";
                alert("Parameters outside expected range for any specific crop.");
                return;
            }

            // Best Match
            const best = result.suggestions[0];

            // Define UI and Save helpers
            const updateBestMatchUI = (best) => {
                document.getElementById("bestCrop").textContent = best.crop.charAt(0).toUpperCase() + best.crop.slice(1);
                const cropImgSrc = getCropImage(best.crop);
                document.getElementById("bestCropImage").src = cropImgSrc;
                document.getElementById("bestCropIcon").src = cropImgSrc;
                document.getElementById("confidenceVal").textContent = (best.probability * 100).toFixed(1);
            };

            const saveToHistory = async (best, inputs) => {
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) return;
                try {
                    await fetch('/save-crop-history', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: user.username,
                            crop_name: best.crop,
                            confidence: best.probability,
                            temperature: parseFloat(inputs.temperature),
                            humidity: parseFloat(inputs.humidity),
                            ph: parseFloat(inputs.ph),
                            rainfall: parseFloat(inputs.rainfall)
                        })
                    });
                } catch (err) { console.error("History sync failed", err); }
            };

            updateBestMatchUI(best);
            saveToHistory(best, inputs);

            if (result.metadata && result.metadata.warnings) {
                const warnText = result.metadata.warnings.join(' | ');
                const warnDiv = document.createElement('div');
                warnDiv.className = "mt-4 text-[10px] text-orange-400 font-bold uppercase tracking-[0.2em]";
                warnDiv.innerHTML = `<i class="fas fa-triangle-exclamation mr-1"></i> Data Warning: ${warnText}`;
                document.getElementById("bestCrop").parentElement.appendChild(warnDiv);
            }
            if (result.metadata && result.metadata.accuracy) {
                document.getElementById("modelAccuracyBadge").textContent = "Core Accuracy: " + (result.metadata.accuracy * 100).toFixed(1) + "%";
            }

            // Input Summary
            const summary = document.getElementById('inputSummary');
            const fields = [
                { l: 'Temp', v: inputs.temperature + '°C', i: 'fa-temperature-high', c: 'text-orange-400' },
                { l: 'Rain', v: inputs.rainfall + 'mm', i: 'fa-cloud-showers-heavy', c: 'text-blue-400' },
                { l: 'pH', v: inputs.ph, i: 'fa-vial', c: 'text-purple-400' },
                { l: 'N', v: inputs.nitrogen, i: 'fa-leaf', c: 'text-green-400' },
                { l: 'P', v: inputs.phosphorus, i: 'fa-leaf', c: 'text-green-400' },
                { l: 'K', v: inputs.potassium, i: 'fa-leaf', c: 'text-green-400' }
            ];
            fields.forEach(f => {
                summary.innerHTML += `
          <div class="flex flex-col items-center min-w-fit px-4 border-r border-white/5 last:border-0">
            <i class="fas ${f.i} ${f.c} text-sm mb-3"></i>
            <span class="text-[10px] font-bold text-slate-500 uppercase mb-1">${f.l}</span>
            <span class="text-sm font-bold text-white">${f.v}</span>
          </div>
        `;
            });

            // Other Suggestions
            const others = document.getElementById('otherSuggestions');
            result.suggestions.slice(1, 5).forEach(s => {
                others.innerHTML += `
          <div class="glass-card p-6 rounded-3xl flex flex-col justify-between hover:bg-white/5 transition-all group overflow-hidden">
             <div class="relative z-10">
                <p class="text-[10px] font-bold text-slate-600 uppercase mb-4 tracking-widest">Alt Option</p>
                <div class="flex items-center gap-4 mb-4">
                   <div class="w-12 h-12 rounded-xl border border-white/10 overflow-hidden">
                      <img src="${getCropImage(s.crop)}" class="w-full h-full object-contain">
                   </div>
                   <h5 class="text-xl font-bold text-white capitalize">${s.crop}</h5>
                </div>
                <p class="text-xs text-slate-500 font-medium mb-6">Compatible profile</p>
             </div>
             <div class="flex items-center justify-between border-t border-white/5 pt-4 relative z-10">
                <span class="text-xs font-bold text-brand-500">${(s.probability * 100).toFixed(1)}%</span>
                <i class="fas fa-circle-check text-[10px] text-brand-500/30"></i>
             </div>
          </div>
        `;
            });

            // Chart
            Plotly.newPlot("chart", [{
                x: result.suggestions.slice(0, 10).map(s => s.crop),
                y: result.suggestions.slice(0, 10).map(s => s.probability * 100),
                type: "bar",
                marker: {
                    color: '#10b981',
                    opacity: 0.8,
                    line: { color: '#10b981', width: 1 }
                }
            }], {
                margin: { t: 10, b: 50, l: 30, r: 10 },
                paper_bgcolor: "transparent",
                plot_bgcolor: "transparent",
                font: { family: 'Plus Jakarta Sans', color: '#64748b', size: 10 },
                xaxis: { showgrid: false, zeroline: false },
                yaxis: { showgrid: true, gridcolor: 'rgba(255,255,255,0.05)', zeroline: false }
            }, { displayModeBar: false, responsive: true });
        });
    </script>
</body>

</html>

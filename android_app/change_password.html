<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmAI | Security</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            500: '#10b981',
                            600: '#059669',
                        },
                        deep: '#020617',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020617;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-field {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #10b981;
            background: rgba(30, 41, 59, 0.6);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>

<body class="text-slate-200 min-h-screen font-sans flex items-center justify-center p-6">

    <div class="w-full max-w-md animate-fadeIn">

        <div class="text-center mb-10">
            <div
                class="w-16 h-16 rounded-2xl bg-brand-500/10 border border-brand-500/20 flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-shield-halved text-brand-500 text-2xl"></i>
            </div>
            <h1 class="font-display text-3xl font-bold text-white mb-2">Update Security</h1>
            <p class="text-slate-500 text-sm">Protect your agricultural intelligence data</p>
        </div>

        <div class="glass-card rounded-[2.5rem] p-10">
            <form id="changePasswordForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1">Current
                        Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-600"></i>
                        <input type="password" id="currentPassword" required
                            class="input-field w-full pl-11 pr-4 py-4 rounded-2xl text-white outline-none"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="h-px bg-white/5 mx-2"></div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1">New Secure
                        Password</label>
                    <div class="relative">
                        <i class="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-brand-500/50"></i>
                        <input type="password" id="newPassword" required
                            class="input-field w-full pl-11 pr-4 py-4 rounded-2xl text-white outline-none"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1">Verify
                        Password</label>
                    <div class="relative">
                        <i class="fas fa-check-double absolute left-4 top-1/2 -translate-y-1/2 text-slate-600"></i>
                        <input type="password" id="confirmNewPassword" required
                            class="input-field w-full pl-11 pr-4 py-4 rounded-2xl text-white outline-none"
                            placeholder="••••••••">
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-brand-500 hover:bg-brand-600 py-4 mt-4 rounded-2xl text-white font-bold tracking-wide text-lg shadow-xl shadow-brand-500/20 transition-all flex items-center justify-center gap-3">
                    <span>Rotate Password</span>
                    <i class="fas fa-sync-alt text-sm opacity-50"></i>
                </button>
            </form>
        </div>

        <div class="mt-8 text-center">
            <a href="/profile-page"
                class="text-xs font-bold text-slate-500 hover:text-white transition-colors uppercase tracking-widest">
                <i class="fas fa-chevron-left mr-2"></i> Return to Profile
            </a>
        </div>
    </div>

    <script>
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newP = document.getElementById('newPassword').value;
            const confP = document.getElementById('confirmNewPassword').value;

            if (newP !== confP) { alert("Passwords do not match!"); return; }

            const user = JSON.parse(localStorage.getItem('user'));
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';

            try {
                const res = await fetch(`/change-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: user.username,
                        current_password: document.getElementById('currentPassword').value,
                        new_password: newP
                    })
                });

                if (res.ok) {
                    alert('Security keys rotated successfully!');
                    window.location.href = '/profile-page';
                } else {
                    const data = await res.json();
                    alert(data.detail || 'Rotation failed');
                }
            } catch (err) {
                alert('Server unreachable');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Rotate Password</span><i class="fas fa-sync-alt text-sm opacity-50"></i>';
            }
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmAI | Analysis History</title>
    <link rel="icon" type="image/png" href="logo/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: { 500: '#10b981', 600: '#059669' },
                        deep: '#020617',
                        surface: '#0f172a'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            transition: background-color 0.3s, color 0.3s;
        }

        .dark body {
            background-color: #020617;
            color: #ffffff;
            background-image: radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 1);
        }

        .dark .glass-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="min-h-screen">
    <header
        class="fixed top-0 w-full z-50 border-b border-slate-200 dark:border-white/5 bg-white/80 dark:bg-deep/80 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="/" class="flex items-center gap-3">
                    <img src="logo/logo.png" class="w-10 h-10 object-contain">
                    <h1 class="font-display text-xl font-bold dark:text-white">Farm<span
                            class="text-brand-500">AI</span></h1>
                </a>
            </div>
            <nav class="flex items-center gap-6">
                <a href="/"
                    class="text-xs font-bold uppercase tracking-widest text-slate-500 hover:text-brand-500">Dashboard</a>
                <button id="theme-toggle"
                    class="p-2.5 rounded-xl bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block"></i>
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pt-32 pb-20">
        <div class="mb-12">
            <h2 class="font-display text-4xl font-black mb-2 uppercase">Analysis <span
                    class="text-brand-500">History</span></h2>
            <p class="text-slate-500 font-medium">Your past crop recommendations and plant health scans.</p>
        </div>

        <div class="grid lg:grid-cols-2 gap-12">
            <!-- Crop History -->
            <div>
                <h3 class="font-display text-2xl font-bold mb-6 flex items-center gap-3">
                    <i class="fas fa-seedling text-brand-500"></i>
                    Crop Reports
                </h3>
                <div id="cropHistoryList" class="space-y-4">
                    <div class="glass-card p-10 rounded-3xl text-center opacity-50">
                        <i class="fas fa-folder-open text-4xl mb-4"></i>
                        <p>No crop records found.</p>
                    </div>
                </div>
            </div>

            <!-- Disease History -->
            <div>
                <h3 class="font-display text-2xl font-bold mb-6 flex items-center gap-3">
                    <i class="fas fa-microscope text-brand-500"></i>
                    Health Scans
                </h3>
                <div id="diseaseHistoryList" class="space-y-4">
                    <div class="glass-card p-10 rounded-3xl text-center opacity-50">
                        <i class="fas fa-folder-open text-4xl mb-4"></i>
                        <p>No disease records found.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });

        async function loadHistory() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = '/login';
                return;
            }

            try {
                const res = await fetch(`/get-user-history/${user.username}`);
                const data = await res.json();

                renderCropHistory(data.crops);
                renderDiseaseHistory(data.diseases);
            } catch (err) {
                console.error("Failed to load history", err);
            }
        }

        function renderCropHistory(crops) {
            const list = document.getElementById('cropHistoryList');
            if (crops.length === 0) return;
            list.innerHTML = '';
            crops.forEach(c => {
                const date = new Date(c.timestamp).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                list.innerHTML += `
                    <div class="glass-card p-6 rounded-3xl hover:border-brand-500/30 transition-all group">
                        <div class="flex items-center justify-between mb-4">
                            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">${date}</span>
                            <span class="px-3 py-1 bg-brand-500/10 text-brand-500 text-[10px] font-black rounded-full">${(c.confidence * 100).toFixed(1)}% Match</span>
                        </div>
                        <h4 class="text-xl font-bold dark:text-white capitalize mb-4">${c.crop_name}</h4>
                        <div class="grid grid-cols-3 gap-2">
                             <div class="bg-slate-100 dark:bg-white/5 p-2 rounded-xl text-center">
                                <p class="text-[8px] uppercase text-slate-500 font-bold">Temp</p>
                                <p class="text-xs font-bold">${c.temperature}°C</p>
                             </div>
                             <div class="bg-slate-100 dark:bg-white/5 p-2 rounded-xl text-center">
                                <p class="text-[8px] uppercase text-slate-500 font-bold">Rain</p>
                                <p class="text-xs font-bold">${c.rainfall}mm</p>
                             </div>
                             <div class="bg-slate-100 dark:bg-white/5 p-2 rounded-xl text-center">
                                <p class="text-[8px] uppercase text-slate-500 font-bold">pH</p>
                                <p class="text-xs font-bold">${c.ph}</p>
                             </div>
                        </div>
                    </div>
                `;
            });
        }

        function renderDiseaseHistory(diseases) {
            const list = document.getElementById('diseaseHistoryList');
            if (diseases.length === 0) return;
            list.innerHTML = '';
            diseases.forEach(d => {
                const date = new Date(d.timestamp).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                list.innerHTML += `
                    <div class="glass-card p-6 rounded-3xl hover:border-brand-500/30 transition-all">
                        <div class="flex items-center justify-between mb-4">
                            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">${date}</span>
                            <span class="text-xs font-bold text-brand-500">${(d.confidence * 100).toFixed(1)}% Conf.</span>
                        </div>
                        <h4 class="text-lg font-bold dark:text-white mb-2">${d.disease_name}</h4>
                        <p class="text-xs text-slate-500 leading-relaxed italic border-l-2 border-brand-500 pl-3">Treatment: ${d.treatment}</p>
                    </div>
                `;
            });
        }

        loadHistory();
    </script>
</body>

</html>

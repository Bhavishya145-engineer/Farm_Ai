<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmAI | Fertilizer Hub</title>
    <link rel="icon" type="image/png" href="logo/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: { 500: '#10b981', 600: '#059669' },
                        deep: '#020617',
                        surface: '#0f172a'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            transition: background-color 0.3s, color 0.3s;
        }

        .dark body {
            background-color: #020617;
            color: #ffffff;
            background-image: radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 1);
            transition: all 0.3s ease;
        }

        .dark .glass-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-field {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            color: #000000;
            transition: all 0.3s ease;
        }

        .dark .input-field {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(148, 163, 184, 0.1);
            color: #ffffff;
        }

        .input-field:focus {
            border-color: #10b981;
            outline: none;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.8s ease-out forwards;
        }
    </style>
</head>

<body class="min-h-screen">
    <header
        class="fixed top-0 w-full z-50 border-b border-slate-200 dark:border-white/5 bg-white/80 dark:bg-deep/80 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="/" class="flex items-center gap-3">
                    <img src="logo/logo.png" class="w-10 h-10 object-contain">
                    <h1 class="font-display text-xl font-bold dark:text-white leading-none">Farm<span
                            class="text-brand-500">AI</span></h1>
                </a>
            </div>
            <nav class="flex items-center gap-6">
                <a href="/"
                    class="text-xs font-bold uppercase tracking-widest text-slate-500 hover:text-brand-500">Dashboard</a>
                <button id="theme-toggle"
                    class="p-2.5 rounded-xl bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 text-slate-500 dark:text-slate-400">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block"></i>
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 pt-32 pb-20 animate-fadeIn">
        <div class="text-center mb-16">
            <h2 class="font-display text-5xl font-black mb-4 uppercase leading-tight">Fertilizer <span
                    class="text-brand-500">Optimizer</span></h2>
            <p class="text-slate-500 text-lg max-w-2xl mx-auto">Get precise nutrient recommendations based on your
                soil's NPK profile.</p>
        </div>

        <div class="grid md:grid-cols-2 gap-12">
            <!-- Input Form -->
            <div class="glass-card p-10 rounded-[2.5rem]">
                <form id="fertilizerForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-500 uppercase tracking-widest mb-3">Target
                            Crop</label>
                        <select id="crop" required class="input-field w-full px-6 py-4 rounded-2xl">
                            <option value="rice">Rice</option>
                            <option value="maize">Maize</option>
                            <option value="wheat">Wheat</option>
                            <option value="cotton">Cotton</option>
                            <option value="sugarcane">Sugarcane</option>
                            <option value="other">General / Other</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-3 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Nitrogen
                                (N)</label>
                            <input type="number" id="nitrogen" placeholder="0" required
                                class="input-field w-full px-4 py-3 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Phosphorus
                                (P)</label>
                            <input type="number" id="phosphorus" placeholder="0" required
                                class="input-field w-full px-4 py-3 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Potassium
                                (K)</label>
                            <input type="number" id="potassium" placeholder="0" required
                                class="input-field w-full px-4 py-3 rounded-xl">
                        </div>
                    </div>

                    <button type="submit"
                        class="w-full bg-brand-500 hover:bg-brand-600 py-5 rounded-2xl text-white font-black uppercase tracking-widest transition-all shadow-lg shadow-brand-500/20">
                        Analyze Soil Needs
                    </button>
                </form>
            </div>

            <!-- Result Display -->
            <div id="resultView" class="hidden flex flex-col h-full">
                <div class="glass-card p-10 rounded-[2.5rem] flex-grow border-brand-500/20">
                    <span
                        class="inline-block px-4 py-1 rounded-full bg-brand-500/10 text-brand-500 text-[10px] font-black uppercase tracking-[0.2em] mb-8 border border-brand-500/20">Verified
                        Suggestion</span>
                    <h3 id="cropResult" class="font-display text-2xl font-bold dark:text-white capitalize mb-4">Rice
                    </h3>
                    <p class="text-sm text-slate-500 font-medium mb-8">Based on the analysis, your soil requires the
                        following adjustment:</p>

                    <div class="p-6 rounded-3xl bg-brand-500/5 border border-brand-500/10 mb-8">
                        <p id="recommendationText"
                            class="text-lg font-bold text-brand-600 dark:text-brand-500 leading-relaxed"></p>
                    </div>

                    <div class="flex items-center gap-4 text-slate-500">
                        <i class="fas fa-certificate text-brand-500"></i>
                        <span class="text-xs font-bold uppercase tracking-widest">Scientific Standard Data</span>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div id="emptyView"
                class="flex flex-col items-center justify-center glass-card p-10 rounded-[2.5rem] opacity-40">
                <div class="w-16 h-16 rounded-full bg-slate-200 dark:bg-white/5 flex items-center justify-center mb-6">
                    <i class="fas fa-flask text-2xl"></i>
                </div>
                <p class="font-bold uppercase tracking-widest text-xs">Awaiting Analysis</p>
            </div>
        </div>
    </main>

    <script>
        // Theme Management
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });

        // Form Submission
        const form = document.getElementById('fertilizerForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const reqData = {
                nitrogen: parseFloat(document.getElementById('nitrogen').value),
                phosphorus: parseFloat(document.getElementById('phosphorus').value),
                potassium: parseFloat(document.getElementById('potassium').value),
                crop: document.getElementById('crop').value
            };

            try {
                const res = await fetch('/predict-fertilizer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reqData)
                });

                const data = await res.json();
                displayResult(data);
            } catch (err) {
                alert("Analysis engine unreachable.");
            }
        });

        function displayResult(data) {
            document.getElementById('emptyView').classList.add('hidden');
            document.getElementById('resultView').classList.remove('hidden');

            document.getElementById('cropResult').textContent = data.crop;
            document.getElementById('recommendationText').textContent = data.recommendation;
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmAI | Login</title>
  <link rel="icon" type="image/png" href="logo/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#10b981',
              600: '#059669',
              700: '#047857',
              800: '#065f46',
              900: '#064e3b',
            },
            deep: '#020617'
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #020617;
      overflow-x: hidden;
    }

    .glass-effect {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .gradient-text {
      background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .input-field {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.1);
      transition: all 0.3s ease;
    }

    .input-field:focus {
      border-color: #10b981;
      background: rgba(30, 41, 59, 0.8);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }

    .btn-primary {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
    }

    .hero-img {
      background-image: url('logo/farmer_bg_dark.png');
      background-size: cover;
      background-position: center;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fadeIn {
      animation: fadeIn 0.8s ease-out forwards;
    }
  </style>
</head>

<body class="min-h-screen flex font-sans text-slate-200">

  <!-- Left Side: Image Content -->
  <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden hero-img">
    <div class="absolute inset-0 bg-gradient-to-t from-deep via-transparent to-transparent opacity-80"></div>
    <div class="absolute bottom-12 left-12 max-w-lg animate-fadeIn">
      <h2 class="font-display text-5xl font-bold text-white mb-6 leading-tight">
        Empowering Farmers with <span class="gradient-text">AI Precision</span>.
      </h2>
      <p class="text-slate-300 text-lg leading-relaxed">
        Join thousands of farmers across the globe using intelligence to grow faster, smarter, and more sustainably.
      </p>
    </div>
  </div>

  <!-- Right Side: Login Form -->
  <div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12 md:p-16 lg:p-24 bg-deep">
    <div class="w-full max-w-md animate-fadeIn">

      <!-- Logo Section -->
      <div class="flex flex-col items-center mb-10">
        <div
          class="w-16 h-16 rounded-2xl bg-brand-500/10 flex items-center justify-center border border-brand-500/20 mb-4 p-2">
          <img src="logo/logo.png" alt="FarmAI" class="w-full h-full object-contain">
        </div>
        <h1 class="font-display text-3xl font-bold tracking-tight text-white mb-2">Welcome Back</h1>
        <p class="text-slate-400">Unlock your farm's full potential</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-6">
        <div>
          <label for="username" class="block text-sm font-semibold text-slate-300 mb-2">Username</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500">
              <i class="fas fa-at"></i>
            </div>
            <input type="text" id="username" required
              class="input-field w-full pl-11 pr-4 py-3.5 rounded-xl text-white placeholder-slate-500 outline-none"
              placeholder="Enter your username">
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-2">
            <label for="password" class="block text-sm font-semibold text-slate-300">Password</label>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500">
              <i class="fas fa-key"></i>
            </div>
            <input type="password" id="password" required
              class="input-field w-full pl-11 pr-4 py-3.5 rounded-xl text-white placeholder-slate-500 outline-none"
              placeholder="••••••••">
          </div>
        </div>

        <button type="submit"
          class="btn-primary w-full py-4 rounded-xl text-white font-bold tracking-wide text-lg shadow-lg">
          Sign In
        </button>

        <div class="relative py-4 flex items-center">
          <div class="flex-grow border-t border-slate-800"></div>
          <span class="flex-shrink mx-4 text-slate-500 text-xs uppercase tracking-widest font-bold">New to
            FarmAI?</span>
          <div class="flex-grow border-t border-slate-800"></div>
        </div>

        <a href="/register-page"
          class="block w-full text-center py-4 rounded-xl border border-slate-800 text-slate-300 font-semibold hover:bg-slate-800 transition-all">
          Create an Account
        </a>
      </form>

      <!-- Footer Info -->
      <div class="mt-12 text-center">
        <p class="text-slate-500 text-sm">
          &copy; 2026 FarmAI Technologies. <br class="sm:hidden"> All rights reserved.
        </p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
      btn.disabled = true;

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('user', JSON.stringify(data.user));
          localStorage.setItem('token', data.access_token);
          window.location.href = '/';
        } else {
          showError(data.detail || 'Login failed');
        }
      } catch (err) {
        showError('An error occurred. Is the backend running?');
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    });

    function showError(msg) {
      const div = document.createElement('div');
      div.className = 'fixed top-6 right-6 bg-red-500/10 border border-red-500/20 text-red-500 px-6 py-4 rounded-xl backdrop-blur-md shadow-2xl animate-fadeIn z-50';
      div.innerHTML = `<i class="fas fa-exclamation-circle mr-2"></i> ${msg}`;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 4000);
    }
  </script>
</body>

</html>
